# Blog — Next.js, reverse-proxied by Caddy on the `web` network
#
#   docker compose up --build -d
#   open http://146.190.139.118/

services:
  blog:
    build: .
    container_name: blog
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
    # Persist Markdown posts written from the admin UI
    volumes:
      - ./content:/app/content
    # Optional direct access for debugging (not required via Caddy):
    # ports:
    #   - "3000:3000"
    networks:
      - web
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

networks:
  web:
    external: true
