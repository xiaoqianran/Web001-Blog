name: RSS Feeds Lab

on:
  schedule:
    # Every 6 hours — HN moves fast; arXiv is quieter
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rss-feeds
  cancel-in-progress: false

jobs:
  fetch:
    name: Fetch & commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Fetch RSS feeds
        run: node scripts/fetch-rss-feeds.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/data/rss-feeds/
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          DATE=$(date -u +%F)
          git commit -m "content: RSS feeds snapshot ${DATE}"
          git push
