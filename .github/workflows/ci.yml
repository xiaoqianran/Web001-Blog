name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      SESSION_SECRET: ci-session-secret-not-for-production-use-32b
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ci-password
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit / smoke tests
        run: npm test

      - name: Production build
        run: npm run build

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t blog:ci .

      - name: Smoke-run container
        run: |
          docker run -d --name blog-ci \
            -e SESSION_SECRET=ci-session-secret-not-for-production-use-32b \
            -e ADMIN_USERNAME=admin \
            -e ADMIN_PASSWORD=ci-password \
            -e NEXT_PUBLIC_SITE_URL=http://localhost:3000 \
            -p 3000:3000 \
            blog:ci

          ok=0
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:3000/ >/dev/null 2>&1; then
              ok=1
              break
            fi
            sleep 2
          done

          if [ "$ok" != "1" ]; then
            echo "Container failed to become ready"
            docker logs blog-ci 2>&1 | tail -50
            docker rm -f blog-ci
            exit 1
          fi

          code_home=$(curl -fsS -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/)
          code_blog=$(curl -fsS -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/blog)
          code_login=$(curl -fsS -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/login)
          echo "home=$code_home blog=$code_blog login=$code_login"

          test "$code_home" = "200"
          test "$code_blog" = "200"
          test "$code_login" = "200"

          docker rm -f blog-ci
