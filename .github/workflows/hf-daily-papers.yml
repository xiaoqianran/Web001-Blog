name: HF Daily Papers

on:
  schedule:
    # 08:00 UTC ≈ 16:00 CST
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hf-daily-papers
  cancel-in-progress: false

jobs:
  fetch:
    name: Fetch & commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch daily papers
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: node scripts/fetch-hf-daily.mjs --limit=15 --sort=trending

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/data/hf-daily/
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          DATE=$(date -u +%F)
          git commit -m "content: HF daily papers ${DATE}"
          git push
